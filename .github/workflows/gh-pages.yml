name: GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm install

      - name: Copy site data to static
        run: |
          rm -rf static/{molecules,structures,trajectories}
          cp -r src/site/{molecules,structures,trajectories} static/

      - name: Decompress .json.gz data for rolldown glob resolution
        run: find src/site -name '*.json.gz' -exec sh -c 'gunzip -k "$1"' _ {} \;

      - run: npx vp build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
