name: GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: corepack enable && pnpm install

      # adapter-static won't follow symlinks out of static/, so replace each
      # static/<dir> -> ../src/site/<dir> symlink with a real copy (auto-discovered)
      - name: Materialize static data symlinks
        run: |
          for link in static/*; do
            [ -L "$link" ] || continue
            target="$(readlink "$link")"
            case "$target" in ../src/site/*) rm "$link"; cp -r "${target#../}" "$link" ;; esac
          done

      - run: pnpm exec vp build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
