name: Tests

on:
  pull_request:
    branches: [main]
    paths-ignore: [extensions/dash/**]
  push:
    branches: [main]
    paths-ignore: [extensions/dash/**]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Unit tests
        run: pnpm exec vp test --run

  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # let every shard finish so we see all failures, not just the first
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Install Playwright
        run: npx playwright install chromium
      - name: E2E tests (shard ${{ matrix.shard }}/4)
        run: npx playwright test --shard=${{ matrix.shard }}/4
