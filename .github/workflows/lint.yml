name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: latest

      - run: corepack enable && pnpm install

      - uses: j178/prek-action@v2

  knip:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: latest

      - run: corepack enable && pnpm install

      - name: Check for unused dependencies
        run: pnpm run knip
