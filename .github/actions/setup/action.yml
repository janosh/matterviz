name: Setup
description: Node 24 + pnpm, root install, and optional extension installs

inputs:
  extensions:
    description: Space-separated extension dirs under extensions/ to also install
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    - shell: bash
      env:
        EXTENSIONS: ${{ inputs.extensions }}
      run: |
        corepack enable
        pnpm install
        # --ignore-workspace: a freshly released dep trips pnpm's cooldown
        # (minimumReleaseAge), auto-creating a pnpm-workspace.yaml that makes these
        # standalone extension installs no-ops (skipping anywidget/@types/node/matterviz).
        for ext in $EXTENSIONS; do pnpm -C "extensions/$ext" install --ignore-workspace; done
